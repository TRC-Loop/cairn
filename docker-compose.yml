services:
  cairn:
    build:
      context: .
      args:
        VERSION: ${CAIRN_VERSION:-dev}
        REVISION: ${CAIRN_REVISION:-unknown}
    image: ghcr.io/trc-loop/cairn:${CAIRN_VERSION:-dev}
    ports:
      - "8080:8080"
    environment:
      CAIRN_ENCRYPTION_KEY: ${CAIRN_ENCRYPTION_KEY:?CAIRN_ENCRYPTION_KEY required}
      CAIRN_DB_PATH: /data/cairn.db
      CAIRN_LISTEN_ADDR: ":8080"
      CAIRN_BEHIND_TLS: ${CAIRN_BEHIND_TLS:-false}
    volumes:
      - cairn-data:/data
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "/cairn", "healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Development-only SMTP test container. Web UI on :8025, SMTP on :1025.
  # Enable with: docker compose --profile dev up
  mailpit:
    image: axllent/mailpit:latest
    profiles: ["dev"]
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

volumes:
  cairn-data:
