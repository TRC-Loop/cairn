# SPDX-License-Identifier: AGPL-3.0-or-later
version: 2
project_name: cairn

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/cairn
    binary: cairn
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.cairnVersion={{ .Version }} -X main.cairnRevision={{ .Commit }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

dockers_v2:
  - dockerfile: Dockerfile.release
    images:
      - "ghcr.io/trc-loop/cairn"
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.title": "Cairn"
      "org.opencontainers.image.description": "Self-hosted monitoring, incident management, and status pages"
      "org.opencontainers.image.url": "https://cairn.arne.sh"
      "org.opencontainers.image.source": "https://github.com/TRC-Loop/cairn"
      "org.opencontainers.image.documentation": "https://cairn.arne.sh"
      "org.opencontainers.image.licenses": "AGPL-3.0-or-later"
      "org.opencontainers.image.vendor": "TRC-Loop"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.revision": "{{ .Commit }}"

release:
  github:
    owner: TRC-Loop
    name: cairn
  draft: true
  prerelease: auto
