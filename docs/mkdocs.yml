site_name: Cairn
site_description: Self-hosted monitoring, incident management, and status pages
site_url: https://cairn.arne.sh
repo_url: https://github.com/TRC-Loop/cairn
repo_name: TRC-Loop/cairn
edit_uri: edit/main/docs/content/

docs_dir: content

theme:
  name: material
  language: en
  font:
    text: Geist
    code: Geist Mono
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/cairn.css

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago

nav:
